services:
  - type: web
    name: linkedin-poster-web
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkedin-poster-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: LINKEDIN_SCOPES
        value: openid profile email w_member_social
      - key: LINKEDIN_API_VERSION
        value: "202605"

  - type: cron
    name: linkedin-poster-publish-cron
    env: node
    schedule: "* * * * *"
    buildCommand: npm install && npx prisma generate
    startCommand: node scripts/publishDuePosts.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkedin-poster-db
          property: connectionString
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_API_VERSION
        value: "202605"

databases:
  - name: linkedin-poster-db
    plan: starter
