services:
  - type: web
    name: linkedin-poster-web
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkedin-poster-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: LINKEDIN_SCOPES
        value: openid profile email w_member_social
      - key: LINKEDIN_API_VERSION
        value: "202605"
      # Run the publisher in-process inside the web service, hourly.
      - key: PUBLISH_SCHEDULER
        value: "on"
      - key: PUBLISH_INTERVAL_MINUTES
        value: "60"
      # AI drafting / tone features.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

# Note: the publisher now runs inside the web service on an hourly timer
# (PUBLISH_SCHEDULER=on), so no separate Render Cron Job is needed. The
# scripts/publishDuePosts.js script and the protected /internal/publish-due-posts
# endpoint remain available for manual or external triggering.

databases:
  - name: linkedin-poster-db
    plan: starter
