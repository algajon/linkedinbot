services:
  - type: web
    name: linkedin-poster-web
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      # External Postgres (e.g. Neon free tier). Use the DIRECT (non-pooled)
      # connection string so prisma migrate deploy works. Set in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: LINKEDIN_SCOPES
        value: openid profile email w_member_social
      - key: LINKEDIN_API_VERSION
        value: "202605"
      # Free web services sleep when idle, so the in-process timer is OFF here.
      # An external hourly cron (e.g. cron-job.org) POSTs to
      # /internal/publish-due-posts with the x-internal-cron-secret header,
      # which both wakes the service and publishes due posts.
      - key: PUBLISH_SCHEDULER
        value: "off"
      # AI drafting / tone features. Claude is preferred when ANTHROPIC_API_KEY
      # is set; OpenAI is the fallback.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o

# Free-tier deployment: web service on Render's free plan + external Postgres
# (Neon/Supabase free tier, set via DATABASE_URL) + an external hourly cron
# hitting /internal/publish-due-posts. No paid resources required.
